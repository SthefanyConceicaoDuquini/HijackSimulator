<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador BGP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #334155;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1100px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .header h1 { font-size: 1.5rem; letter-spacing: -0.025em; color: var(--primary); margin: 0; }

        .toolbar { display: flex; gap: 12px; }
        .btn { padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 0.875rem; transition: all 0.2s; border: 1px solid transparent; display: flex; align-items: center; gap: 8px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-secondary { background: var(--card); color: var(--text); border-color: var(--border); }
        .btn-secondary:hover { background: var(--border); }

        .topology-card { background: var(--card); border-radius: 12px; padding: 40px; margin-bottom: 24px; border: 1px solid var(--border); position: relative; }
        .nodes-flow { display: flex; align-items: center; justify-content: space-around; position: relative; }
        
        .node { text-align: center; z-index: 2; }
        .node-icon { width: 80px; height: 80px; background: #0f172a; border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--border); transition: all 0.4s; }
        .node p { margin-top: 12px; font-size: 0.875rem; font-weight: 500; color: #94a3b8; }

        .node-active .node-icon { border-color: var(--success); color: var(--success); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .node-warning .node-icon { border-color: var(--danger); color: var(--danger); }

        .edge { position: absolute; height: 2px; width: 40%; background: var(--border); top: 40px; left: 30%; z-index: 1; transition: all 0.4s; }
        .edge-active { background: var(--success); }
        .edge-warning { background: var(--danger); height: 3px; animation: dash 1.5s linear infinite; }

        @keyframes dash { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px; }
        .data-panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .panel-header { background: rgba(255,255,255,0.03); padding: 12px 16px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #64748b; border-bottom: 1px solid var(--border); }
        
        pre { margin: 0; padding: 16px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; color: #cbd5e1; line-height: 1.6; overflow-x: auto; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 8px; }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Simulacao BGP <small style="font-size: 0.6rem; color: #64748b;">BIRD</small></h1>
            <div class="toolbar">
                <a href="/attack" class="btn btn-danger"><i class="fas fa-bolt"></i> Simular sequestro</a>
                <a href="/cleanup" class="btn btn-secondary"><i class="fas fa-broom"></i> Desfazer sequestro</a>
            </div>
        </div>

        <div class="topology-card">
            <div class="nodes-flow">
                <div class="node {{ 'node-active' if status else '' }}">
                    <div class="node-icon"><i class="fas fa-server"></i></div>
                    <p>AS 1 (Origem)</p>
                </div>

                <div class="edge {{ 'edge-active' if status else '' }} {{ 'edge-warning' if hijacked else '' }}"></div>

                <div class="node {{ 'node-warning' if hijacked else '' }}">
                    <div class="node-icon"><i class="fas fa-network-wired"></i></div>
                    <p>AS 2 (Transito/Atacante)</p>
                </div>
            </div>
            {% if hijacked %}
            <div style="text-align: center; margin-top: 20px;">
                <span class="badge badge-danger"><i class="fas fa-exclamation-triangle"></i> HIJACK DETECTADO: Prefixo 1.1.1.1/32</span>
            </div>
            {% endif %}
        </div>

        <div class="grid">
            <div class="data-panel">
                <div class="panel-header">Adjacência BGP</div>
                <pre>{{ proto }}</pre>
            </div>
            <div class="data-panel">
                <div class="panel-header">RIB</div>
                <pre>{{ route }}</pre>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => { location.reload(); }, 3000);
    </script>
</body>
</html>
